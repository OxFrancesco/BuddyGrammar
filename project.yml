name: BuddyGrammar
options:
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 15.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    CODE_SIGN_STYLE: Automatic
targets:
  BuddyGrammar:
    type: application
    platform: macOS
    sources:
      - path: BuddyGrammar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.francescooddo.BuddyGrammar
        INFOPLIST_FILE: BuddyGrammar/Support/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_NAME: BuddyGrammar
        ENABLE_HARDENED_RUNTIME: YES
  BuddyGrammarTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: BuddyGrammarTests
    dependencies:
      - target: BuddyGrammar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.francescooddo.BuddyGrammarTests
        GENERATE_INFOPLIST_FILE: YES
